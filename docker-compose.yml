services:
  finai-flash:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finai-flash
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8888
      OLLAMA_HOST: http://ollama:11434
      MODEL: ${MODEL:-qwen2.5:7b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-180}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-2048}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-768}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.05}
      DATABASE_URL: sqlite+aiosqlite:///./data/finai.db
      RSSHUB_BASE_URL: http://rsshub:1200
      COLLECT_INTERVAL_SECONDS: ${COLLECT_INTERVAL_SECONDS:-5}
      MAX_NEWS_AGE_HOURS: ${MAX_NEWS_AGE_HOURS:-24}
      AUTO_ANALYZE_FLASH: ${AUTO_ANALYZE_FLASH:-true}
      AUTO_ANALYSIS_MAX_PENDING: ${AUTO_ANALYSIS_MAX_PENDING:-3}
      LIVE_MARKET_QUOTES: ${LIVE_MARKET_QUOTES:-true}
      MARKET_QUOTE_EXACT_PRICES: ${MARKET_QUOTE_EXACT_PRICES:-false}
      MARKET_QUOTE_TIMEOUT_SECONDS: ${MARKET_QUOTE_TIMEOUT_SECONDS:-4}
      ALERT_SCORE_THRESHOLD: ${ALERT_SCORE_THRESHOLD:-7}
      ANALYSIS_LANGUAGE: ${ANALYSIS_LANGUAGE:-zh}
      MY_POSITIONS: ${MY_POSITIONS:-}
      TG_BOT_TOKEN: ${TG_BOT_TOKEN:-}
      TG_CHAT_ID: ${TG_CHAT_ID:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    ports:
      - "${PORT:-8888}:8888"
    volumes:
      - finai-data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      rsshub:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: finai-ollama
    restart: unless-stopped
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_CONTEXT_LENGTH: 2048
      OLLAMA_KEEP_ALIVE: 1m
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_NUM_PARALLEL: 1
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
  ollama-init:
    image: ollama/ollama:latest
    container_name: finai-ollama-init
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
      MODEL: ${MODEL:-qwen2.5:7b}
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -lc
      - |
        ollama list | grep -q "^${MODEL:-qwen2.5:7b}[[:space:]]" && exit 0
        ollama pull "${MODEL:-qwen2.5:7b}" || true

  rsshub:
    image: diygod/rsshub:latest
    container_name: finai-rsshub
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: redis://rsshub-redis:6379/
    depends_on:
      rsshub-redis:
        condition: service_started

  rsshub-redis:
    image: redis:7-alpine
    container_name: finai-rsshub-redis
    restart: unless-stopped

volumes:
  finai-data:
  ollama-models:
