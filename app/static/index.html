<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinAI-Flash</title>
  <style>
    :root {
      --bg: #071019;
      --bg2: #0c1625;
      --panel: rgba(10, 20, 34, 0.92);
      --line: rgba(143, 174, 216, 0.16);
      --text: #eef6ff;
      --muted: #91a8c4;
      --soft: #c5d6e9;
      --cyan: #4ad7ff;
      --teal: #34d0a5;
      --gold: #f6c56a;
      --bull: #3ad47d;
      --bear: #ff7a7a;
      --neutral: #f0ca74;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.34);
      --r1: 24px;
      --r2: 18px;
      --pill: 999px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 0% 0%, rgba(74, 215, 255, 0.14), transparent 26%),
        radial-gradient(circle at 100% 0%, rgba(52, 208, 165, 0.11), transparent 22%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    }
    .shell { max-width: 1420px; margin: 0 auto; padding: 24px 16px 36px; }
    .panel {
      background: linear-gradient(180deg, rgba(14, 27, 44, 0.96), rgba(8, 16, 28, 0.95));
      border: 1px solid var(--line);
      border-radius: var(--r1);
      box-shadow: var(--shadow);
    }
    .hero { display: grid; grid-template-columns: 1.45fr .95fr; gap: 16px; margin-bottom: 16px; }
    .hero .panel, .workspace .panel { overflow: hidden; }
    .pad { padding: 20px; }
    .kicker {
      display: inline-flex; gap: 10px; align-items: center; padding: 7px 12px; border-radius: var(--pill);
      border: 1px solid rgba(74, 215, 255, 0.22); background: rgba(74, 215, 255, 0.08);
      color: #bdefff; font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 0 0 rgba(52, 208, 165, 0.4); animation: pulse 1.8s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(52, 208, 165, 0.4); } 70% { box-shadow: 0 0 0 12px rgba(52, 208, 165, 0); } 100% { box-shadow: 0 0 0 0 rgba(52, 208, 165, 0); } }
    h1 { margin: 14px 0 10px; font-size: clamp(34px, 4.8vw, 56px); line-height: .98; letter-spacing: -.05em; max-width: 760px; }
    .sub { margin: 0; color: var(--muted); line-height: 1.8; font-size: 15px; max-width: 760px; }
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 18px; }
    .stat, .signal, .filters, .feed-card, .analysis-box {
      border: 1px solid var(--line); border-radius: var(--r2); background: rgba(255, 255, 255, 0.025);
    }
    .stat { padding: 14px; }
    .stat label, .section-title {
      display: block; margin-bottom: 8px; color: var(--muted); font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    }
    .stat strong { display: block; font-size: 24px; margin-bottom: 3px; }
    .stat span { color: var(--soft); font-size: 13px; }
    .workspace { display: grid; grid-template-columns: 330px minmax(0,1fr); gap: 16px; }
    .sidebar { display: grid; gap: 16px; position: sticky; top: 16px; align-self: start; }
    .filters, .signal, .feed-card { padding: 18px; }
    .search {
      width: 100%; border: 1px solid var(--line); outline: 0; color: var(--text); background: rgba(255,255,255,.03);
      border-radius: 14px; padding: 13px 14px; font-size: 14px;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      cursor: pointer; border: 1px solid var(--line); border-radius: var(--pill); background: rgba(255,255,255,.03);
      color: var(--soft); padding: 8px 12px; font-size: 12px;
    }
    .chip.active { background: linear-gradient(135deg, var(--cyan), var(--teal)); color: #08111a; border-color: transparent; font-weight: 700; }
    .toggle-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 12px 14px; border: 1px solid var(--line); border-radius: 16px; background: rgba(255,255,255,.025); color: var(--soft); font-size: 14px; }
    .toggle { appearance: none; width: 50px; height: 28px; border-radius: var(--pill); background: rgba(255,255,255,.12); position: relative; cursor: pointer; }
    .toggle::after { content: ""; position: absolute; top: 4px; left: 4px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: transform .18s ease; }
    .toggle:checked { background: linear-gradient(135deg, var(--cyan), var(--teal)); }
    .toggle:checked::after { transform: translateX(22px); }
    .signal h3 { margin: 10px 0 8px; font-size: 23px; line-height: 1.32; }
    .signal p { margin: 0 0 10px; color: var(--soft); line-height: 1.75; font-size: 14px; }
    .signal-meta, .meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .tag, .asset {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: var(--pill);
      border: 1px solid var(--line); background: rgba(255,255,255,.035); color: var(--soft); font-size: 12px;
    }
    .score { color: #071019; background: linear-gradient(135deg, var(--cyan), var(--teal)); border-color: transparent; font-weight: 700; }
    .bullish { color: var(--bull); border-color: rgba(58, 212, 125, 0.2); background: rgba(58, 212, 125, 0.08); }
    .bearish { color: var(--bear); border-color: rgba(255, 122, 122, 0.2); background: rgba(255, 122, 122, 0.08); }
    .neutral { color: var(--neutral); border-color: rgba(240, 202, 116, 0.2); background: rgba(240, 202, 116, 0.08); }
    .asset { color: #c0eeff; border-color: rgba(74, 215, 255, 0.18); background: rgba(74, 215, 255, 0.08); }
    .empty {
      text-align: center; color: var(--muted); padding: 46px 18px; line-height: 1.8;
      border: 1px dashed rgba(143, 174, 216, 0.22); border-radius: var(--r2);
    }
    .feed-top { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 14px; }
    .feed-top h2 { margin: 0 0 6px; font-size: 16px; letter-spacing: .08em; text-transform: uppercase; color: var(--soft); }
    .feed-top p { margin: 0; color: var(--muted); font-size: 13px; }
    .btn {
      cursor: pointer; border: 0; border-radius: var(--pill); padding: 10px 16px; font-size: 13px; font-weight: 700;
      color: #071019; background: linear-gradient(135deg, var(--cyan), var(--teal));
    }
    .feed-list { display: grid; gap: 12px; }
    .feed-card { display: grid; grid-template-columns: 112px minmax(0,1fr); gap: 14px; transition: transform .16s ease, border-color .16s ease; }
    .feed-card:hover { transform: translateY(-2px); border-color: rgba(143, 174, 216, 0.26); }
    .feed-card.new { animation: rise .5s ease; }
    @keyframes rise { from { opacity: 0; transform: translateY(12px);} to { opacity: 1; transform: translateY(0);} }
    .timeline { border-right: 1px solid rgba(143,174,216,.12); padding-right: 12px; }
    .clock { font-size: 30px; font-weight: 800; letter-spacing: -.05em; line-height: .95; }
    .date { color: var(--muted); font-size: 12px; margin-top: 8px; }
    .src { margin-top: 10px; width: fit-content; }
    .title { margin: 0 0 10px; font-size: 20px; line-height: 1.52; }
    .title a { color: inherit; text-decoration: none; }
    .title a:hover { text-decoration: underline; text-decoration-color: rgba(74, 215, 255, 0.35); }
    .content { margin: 0; color: var(--soft); font-size: 14px; line-height: 1.78; }
    .analysis { margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(143,174,216,.12); display: grid; gap: 12px; }
    .analysis-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 12px; }
    .analysis-box { padding: 14px; }
    .analysis-box label { display: block; color: var(--muted); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 8px; }
    .analysis-box p { margin: 0; color: var(--text); font-size: 14px; line-height: 1.8; }
    @media (max-width: 1160px) { .hero, .workspace { grid-template-columns: 1fr; } .sidebar { position: static; } .stat-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 760px) { .stat-grid, .analysis-grid, .feed-card { grid-template-columns: 1fr; } .timeline { border-right: 0; border-bottom: 1px solid rgba(143,174,216,.12); padding-right: 0; padding-bottom: 12px; } .feed-top { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="panel pad">
        <div class="kicker"><span class="dot"></span> Local Flash Radar</div>
        <h1>像交易终端一样盯住快讯，并立刻给出 AI 判断。</h1>
        <p class="sub">这个页面优先展示实时快讯、AI 标签和高分信号。你可以按来源、情绪和关键词过滤，也可以只看已经完成分析的条目。</p>
        <div class="stat-grid">
          <div class="stat"><label>系统状态</label><strong id="status-app">检查中</strong><span>FastAPI / Scheduler / DB</span></div>
          <div class="stat"><label>当前模型</label><strong id="stat-model">-</strong><span id="status-ollama">等待检查</span></div>
          <div class="stat"><label>可见快讯</label><strong id="stat-count">0</strong><span id="meta-count">等待数据</span></div>
          <div class="stat"><label>已分析</label><strong id="stat-analyzed">0</strong><span id="stat-connections">0 / 0</span></div>
        </div>
      </div>
      <div class="panel pad">
        <h2 class="section-title">Top Signal</h2>
        <div id="top-signal"></div>
      </div>
    </section>

    <section class="workspace">
      <aside class="sidebar">
        <div class="panel pad">
          <h2 class="section-title">过滤器</h2>
          <input id="search-input" class="search" type="search" placeholder="搜索标题、正文、建议..." />
          <div style="height:12px"></div>
          <label class="section-title">来源</label>
          <div id="source-filters" class="chips"></div>
          <div style="height:12px"></div>
          <label class="section-title">情绪</label>
          <div id="sentiment-filters" class="chips"></div>
          <div style="height:12px"></div>
          <div class="toggle-row">
            <span>只看已分析</span>
            <input id="toggle-analyzed" class="toggle" type="checkbox" />
          </div>
        </div>
        <div class="panel pad signal">
          <h2 class="section-title">运行提示</h2>
          <p>默认主链路是 <strong>/api/flash</strong> + <strong>/ws/flash</strong> + <strong>/ws</strong>。</p>
          <p id="status-refresh">最后刷新：等待中</p>
        </div>
      </aside>

      <main class="panel pad">
        <div class="feed-top">
          <div>
            <h2>Flash Tape</h2>
            <p id="meta-summary">尚未收到快讯</p>
          </div>
          <button id="reload-btn" class="btn" type="button">刷新列表</button>
        </div>
        <section id="feed-list" class="feed-list"></section>
      </main>
    </section>
  </div>

  <script>
    const sourceOptions = [
      { value: "all", label: "全部来源" },
      { value: "jin10", label: "金十" },
      { value: "cls", label: "财联社" },
      { value: "cctv_finance", label: "央视财经" }
    ];
    const sentimentOptions = [
      { value: "all", label: "全部情绪" },
      { value: "bullish", label: "利多" },
      { value: "bearish", label: "利空" },
      { value: "neutral", label: "中性" },
      { value: "pending", label: "待分析" }
    ];

    const elements = {
      feedList: document.getElementById("feed-list"),
      searchInput: document.getElementById("search-input"),
      sourceFilters: document.getElementById("source-filters"),
      sentimentFilters: document.getElementById("sentiment-filters"),
      toggleAnalyzed: document.getElementById("toggle-analyzed"),
      reloadBtn: document.getElementById("reload-btn"),
      statusApp: document.getElementById("status-app"),
      statModel: document.getElementById("stat-model"),
      statusOllama: document.getElementById("status-ollama"),
      statCount: document.getElementById("stat-count"),
      statAnalyzed: document.getElementById("stat-analyzed"),
      metaCount: document.getElementById("meta-count"),
      metaSummary: document.getElementById("meta-summary"),
      statConnections: document.getElementById("stat-connections"),
      topSignal: document.getElementById("top-signal"),
      statusRefresh: document.getElementById("status-refresh")
    };

    const state = {
      source: "all",
      sentiment: "all",
      search: "",
      onlyAnalyzed: false
    };

    const flashMap = new Map();
    const newIds = new Set();
    let flashWs = null;
    let analysisWs = null;

    function sourceLabel(source) {
      return sourceOptions.find((item) => item.value === source)?.label || source || "未知";
    }

    function sentimentLabel(sentiment) {
      if (sentiment === "bullish") return "利多";
      if (sentiment === "bearish") return "利空";
      if (sentiment === "neutral") return "中性";
      return "待分析";
    }

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function fmtClock(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "--:--";
      return date.toLocaleTimeString("zh-CN", { hour12: false, hour: "2-digit", minute: "2-digit" });
    }

    function fmtDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value || "-";
      return date.toLocaleDateString("zh-CN", { month: "2-digit", day: "2-digit", weekday: "short" });
    }

    function renderChipGroup(container, options, current, onSelect) {
      container.innerHTML = options.map((item) => `
        <button type="button" class="chip ${item.value === current ? "active" : ""}" data-value="${item.value}">
          ${item.label}
        </button>
      `).join("");
      container.querySelectorAll(".chip").forEach((node) => {
        node.addEventListener("click", () => onSelect(node.dataset.value));
      });
    }

    function updateFilterUI() {
      renderChipGroup(elements.sourceFilters, sourceOptions, state.source, (value) => {
        state.source = value;
        updateFilterUI();
        render();
      });
      renderChipGroup(elements.sentimentFilters, sentimentOptions, state.sentiment, (value) => {
        state.sentiment = value;
        updateFilterUI();
        render();
      });
    }

    function getSortedItems() {
      return [...flashMap.values()].sort((a, b) => new Date(b.pub_time) - new Date(a.pub_time));
    }

    function getFilteredItems() {
      const keyword = state.search.trim().toLowerCase();
      return getSortedItems().filter((item) => {
        const analysis = item.analysis || null;
        const sentiment = analysis?.sentiment || "pending";
        const haystack = [item.title, item.content, analysis?.summary, analysis?.suggestion, analysis?.portfolio_note]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();

        if (state.source !== "all" && item.source !== state.source) return false;
        if (state.onlyAnalyzed && !analysis) return false;
        if (state.sentiment !== "all" && sentiment !== state.sentiment) return false;
        if (keyword && !haystack.includes(keyword)) return false;
        return true;
      });
    }

    function mergeFlash(item, markNew) {
      if (!item || typeof item.id !== "number") return;
      const current = flashMap.get(item.id) || {};
      flashMap.set(item.id, { ...current, ...item });
      if (markNew && !current.id) newIds.add(item.id);
    }

    function setRefreshStamp() {
      elements.statusRefresh.textContent = `最后刷新：${new Date().toLocaleString("zh-CN", { hour12: false })}`;
    }

    function renderTopSignal(items) {
      const top = items.filter((item) => item.analysis).sort((a, b) => (b.analysis?.score || 0) - (a.analysis?.score || 0))[0];
      if (!top?.analysis) {
        elements.topSignal.innerHTML = `<div class="empty">当前还没有高分 AI 信号，等待模型完成更多分析。</div>`;
        return;
      }
      const assets = Array.isArray(top.analysis.affected_assets) ? top.analysis.affected_assets : [];
      elements.topSignal.innerHTML = `
        <div class="signal">
          <div class="meta">
            <span class="tag score">${top.analysis.score}/10</span>
            <span class="tag ${top.analysis.sentiment}">${sentimentLabel(top.analysis.sentiment)}</span>
            <span class="tag">${sourceLabel(top.source)}</span>
          </div>
          <h3>${esc(top.title)}</h3>
          <p>${esc(top.analysis.summary || "")}</p>
          <p><strong>建议：</strong>${esc(top.analysis.suggestion || "")}</p>
          ${assets.length ? `<div class="meta">${assets.map((asset) => `<span class="asset">${esc(asset)}</span>`).join("")}</div>` : ""}
        </div>
      `;
    }

    function renderFeed(items) {
      if (!items.length) {
        elements.feedList.innerHTML = `<div class="empty">没有符合当前过滤条件的快讯。你可以清空筛选，或等待新的实时消息。</div>`;
        return;
      }
      elements.feedList.innerHTML = items.map((item) => {
        const analysis = item.analysis || null;
        const assets = Array.isArray(analysis?.affected_assets) ? analysis.affected_assets : [];
        const title = item.source_url ? `<a href="${esc(item.source_url)}" target="_blank" rel="noreferrer">${esc(item.title)}</a>` : esc(item.title);
        return `
          <article class="feed-card ${newIds.has(item.id) ? "new" : ""}">
            <aside class="timeline">
              <div class="clock">${fmtClock(item.pub_time)}</div>
              <div class="date">${fmtDate(item.pub_time)}</div>
              <div class="tag src">${sourceLabel(item.source)}</div>
            </aside>
            <div>
              <div class="meta" style="margin-bottom:10px;">
                ${analysis ? `<span class="tag score">${analysis.score}/10</span>` : `<span class="tag">待分析</span>`}
                ${analysis ? `<span class="tag ${analysis.sentiment}">${sentimentLabel(analysis.sentiment)}</span>` : ""}
                ${item.is_analyzed ? `<span class="tag">已分析</span>` : ""}
              </div>
              <h3 class="title">${title}</h3>
              ${item.content ? `<p class="content">${esc(item.content)}</p>` : ""}
              ${analysis ? `
                <div class="analysis">
                  <div class="analysis-grid">
                    <div class="analysis-box">
                      <label>AI 摘要</label>
                      <p>${esc(analysis.summary || "")}</p>
                      ${assets.length ? `<div class="meta" style="margin-top:10px;">${assets.map((asset) => `<span class="asset">${esc(asset)}</span>`).join("")}</div>` : ""}
                    </div>
                    <div class="analysis-box">
                      <label>交易建议</label>
                      <p>${esc(analysis.suggestion || "")}</p>
                    </div>
                  </div>
                  ${analysis.portfolio_note ? `<div class="analysis-box"><label>持仓提示</label><p>${esc(analysis.portfolio_note)}</p></div>` : ""}
                </div>
              ` : `<div class="analysis-box" style="margin-top:14px;"><label>分析状态</label><p>这条快讯已入库，AI 分析还在排队或生成中。</p></div>`}
            </div>
          </article>
        `;
      }).join("");
      newIds.clear();
    }

    function render() {
      const items = getFilteredItems();
      const analyzed = items.filter((item) => item.analysis).length;
      elements.statCount.textContent = String(items.length);
      elements.statAnalyzed.textContent = String(analyzed);
      elements.metaCount.textContent = `当前显示 ${items.length} 条`;
      elements.metaSummary.textContent = analyzed ? `其中 ${analyzed} 条已带 AI 标签` : "AI 分析正在陆续补齐";
      renderTopSignal(items);
      renderFeed(items);
    }

    async function loadHealth() {
      try {
        const response = await fetch("/health");
        const data = await response.json();
        elements.statusApp.textContent = data.status === "ok" ? "运行中" : "异常";
        elements.statusApp.style.color = data.status === "ok" ? "var(--bull)" : "var(--bear)";
        elements.statModel.textContent = data.model || "-";
        elements.statusOllama.textContent = data.ollama === "connected" ? "Ollama 已连接" : "Ollama 未连接";
        elements.statusOllama.style.color = data.ollama === "connected" ? "var(--bull)" : "var(--bear)";
        elements.statConnections.textContent = `${data.flash_ws_clients ?? 0} / ${data.ws_clients ?? 0}`;
      } catch (error) {
        elements.statusApp.textContent = "无法连接";
        elements.statusApp.style.color = "var(--bear)";
        elements.statusOllama.textContent = "未知";
      }
    }

    async function loadFlash() {
      try {
        const response = await fetch("/api/flash");
        const items = await response.json();
        items.forEach((item) => mergeFlash(item, false));
        setRefreshStamp();
        render();
      } catch (error) {
        elements.feedList.innerHTML = `<div class="empty">拉取 /api/flash 失败，请检查后端日志。</div>`;
      }
    }

    function connectFlashWs() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      flashWs = new WebSocket(`${proto}://${location.host}/ws/flash`);
      flashWs.onopen = () => flashWs.send("ping");
      flashWs.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type !== "flash") return;
        mergeFlash(msg.data, true);
        setRefreshStamp();
        render();
        loadHealth();
      };
      flashWs.onclose = () => setTimeout(connectFlashWs, 3000);
    }

    function connectAnalysisWs() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      analysisWs = new WebSocket(`${proto}://${location.host}/ws`);
      analysisWs.onopen = () => analysisWs.send("ping");
      analysisWs.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type !== "analysis_done") return;
        const current = flashMap.get(msg.data.news_id);
        if (!current) return;
        flashMap.set(msg.data.news_id, {
          ...current,
          is_analyzed: true,
          analysis: {
            ...current.analysis,
            score: msg.data.score,
            sentiment: msg.data.sentiment,
            summary: msg.data.summary,
            suggestion: msg.data.suggestion,
            portfolio_note: msg.data.portfolio_note
          }
        });
        setRefreshStamp();
        render();
      };
      analysisWs.onclose = () => setTimeout(connectAnalysisWs, 3000);
    }

    elements.searchInput.addEventListener("input", (event) => {
      state.search = event.target.value || "";
      render();
    });
    elements.toggleAnalyzed.addEventListener("change", (event) => {
      state.onlyAnalyzed = Boolean(event.target.checked);
      render();
    });
    elements.reloadBtn.addEventListener("click", async () => {
      await loadHealth();
      await loadFlash();
    });

    updateFilterUI();
    loadHealth();
    loadFlash();
